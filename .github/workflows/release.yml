name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Gerar o instalador .exe
        run: ./gradlew jpackage

      - name: Criar Release e subir o .exe
        uses: softprops/action-gh-release@v2
        with:
          files: build/jpackage/ContextClip-1.0.0.exe